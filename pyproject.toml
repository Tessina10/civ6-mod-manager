# Config d'outils de dev pour app/. Ce fichier ne fait pas de ce dépôt un
# package Python installable (voir CLAUDE.md).

[tool.ruff]
line-length = 120
target-version = "py313"
exclude = ["build", "dist"]

[tool.ruff.lint]
# Règles par défaut de ruff (pyflakes + une partie de pycodestyle) : pas de
# jeu de règles étendu pour rester proche du style existant du code.
select = ["E", "F", "W"]
